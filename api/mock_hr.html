<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Corp HR Portal</title>
</head>
<body>
    <h1>Acme Corp HR Portal</h1>
    <div id="login-form">
        <input type="text" placeholder="Username" id="username">
        <input type="password" placeholder="Password" id="password">
        <button onclick="document.getElementById('login-form').style.display='none'; document.getElementById('dashboard').style.display='block';">Login</button>
    </div>
    
    <div id="dashboard" style="display: none;">
        <h2>Recruitment Pipelines</h2>
        
        <div data-aedt="true" data-name="AI Resume Screener" data-endpoint="/api/screen">
            <h3>AI Resume Screener - Automatically scores candidates</h3>
        </div>
        
        <div data-aedt="true" data-name="Chatbot Interviewer" data-endpoint="/api/chat">
            <h3>Chatbot Interviewer - Conducts initial screening</h3>
        </div>
        
        <div>
            <h3>Manual Review - No automation</h3>
        </div>
    </div>
</body>
</html>
